<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试 - 直接显示文章</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .article { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .title { font-weight: bold; font-size: 18px; }
        .source { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>文章列表 (直接加载)</h1>
    <div id="articles">加载中...</div>
    
    <script>
        async function load() {
            try {
                const response = await fetch('data/articles/research/llm.json');
                const data = await response.json();
                
                document.getElementById('articles').innerHTML = data.map(a => `
                    <div class="article">
                        <div class="title">${a.title || '无标题'}</div>
                        <div class="source">来源: ${typeof a.source === 'string' ? a.source : (a.source?.name || '未知')}</div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('articles').innerHTML = '错误: ' + e.message;
            }
        }
        load();
    </script>
</body>
</html>
