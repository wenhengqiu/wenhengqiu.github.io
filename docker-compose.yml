# Info-Getter Docker 配置
# 使用 Selenium + Chrome 浏览器爬虫

version: '3.8'

services:
  info-getter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: info-getter
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - MONGODB_URI=mongodb://mongo:27017
    depends_on:
      - mongo
      - selenium-hub
    networks:
      - info-getter-network
    command: python3 scripts/fetch_selenium.py

  mongo:
    image: mongo:6.0
    container_name: info-getter-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - info-getter-network

  selenium-hub:
    image: selenium/hub:4.15.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
    networks:
      - info-getter-network

  chrome:
    image: selenium/node-chrome:4.15.0
    container_name: selenium-chrome
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - HUB_HOST=selenium-hub
      - HUB_PORT=4444
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - info-getter-network

volumes:
  mongo-data:

networks:
  info-getter-network:
    driver: bridge
