version: '3.8'

services:
  info-getter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: info-getter
    restart: unless-stopped
    
    environment:
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - LOG_LEVEL=INFO
    
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    
    # 网络模式
    network_mode: host
    
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 用于任务队列
  redis:
    image: redis:7-alpine
    container_name: info-getter-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # 可选：监控面板
  dashboard:
    image: info-getter:latest
    container_name: info-getter-dashboard
    restart: unless-stopped
    command: python -m info_getter.dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data

volumes:
  redis_data:
