<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Big News Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; background: #f5f5f5; border-radius: 8px; }
        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>
<body>
    <h1>AI Big News 测试页面</h1>
    
    <div class="test-section">
        <h2>测试1: 容器检查</h2>
        <div id="test1-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试2: AI Big News 区域</h2>
        <div id="ai-big-news-brief"></div>
        <div id="ai-big-news-list"></div>
    </div>
    
    <script>
        // 测试Markdown内容
        const testMarkdown = `# 🌅 AI Big News · 高管简报

**03月14日 | 精选15篇高质量资讯**

---

## 📋 核心动态

昨日AI行业呈现**2大主线**密集发酵态势。OpenAI、Meta等头部玩家加速布局。

## 🔮 趋势判断

基础模型能力竞争进入白热化，应用层创业窗口正在收窄。

## 📌 重点关注

1. **AI Agent安全设计指南** — *OpenAI*
   > ChatGPT如何防御提示注入攻击

2. **乐天用Codex提效2倍** — *OpenAI*
   > 日本电商巨头使用Codex编程助手
`;

        // 简化的渲染函数
        function renderAIBigNews(markdown) {
            const briefContainer = document.getElementById('ai-big-news-brief');
            const listContainer = document.getElementById('ai-big-news-list');
            
            if (!briefContainer || !listContainer) {
                document.getElementById('test1-result').innerHTML = '<span class="fail">❌ 容器不存在</span>';
                return;
            }
            
            document.getElementById('test1-result').innerHTML = '<span class="pass">✅ 容器存在</span>';
            
            // 解析
            const coreMatch = markdown.match(/## 📋 核心动态\\n\\n([\\s\\S]*?)(?=\\n## 🔮|$)/);
            const trendMatch = markdown.match(/## 🔮 趋势判断\\n\\n([\\s\\S]*?)(?=\\n## 📌|$)/);
            
            if (coreMatch) {
                briefContainer.innerHTML = '<h3>📋 核心动态</h3><p>' + coreMatch[1].trim() + '</p>';
            }
            
            if (trendMatch) {
                briefContainer.innerHTML += '<h3>🔮 趋势判断</h3><p><strong>' + trendMatch[1].trim() + '</strong></p>';
            }
            
            listContainer.innerHTML = '<h3>📌 重点关注</h3><p>解析成功！</p>';
        }
        
        // 运行测试
        renderAIBigNews(testMarkdown);
    </script>
</body>
</html>
