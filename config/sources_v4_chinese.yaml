# Info-Getter 中文信息源配置 v4.0
# 仅采集中文文章
# 总计: 30+ 个高质量中文信息源

version: "4.0"
description: "中文AI行业动态信息源"

total_sources: 30

# 分批配置
fetch_settings:
  mode: "batch_parallel"
  batch_size: 5
  batch_delay: 5
  timeout: 30
  retry_times: 3

# 分类配置
categories:
  llm:
    name: "大模型"
    keywords: ["GPT", "LLM", "大模型", "Claude", "Gemini", "OpenAI", "百度", "阿里", "腾讯", "字节", "智谱", "月之暗面"]
  
