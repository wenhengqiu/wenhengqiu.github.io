# 质量评分配置
quality_scoring:
  min_score: 0.6
  dimensions:
    - content_completeness
    - industry_relevance
    - source_authority
    - timeliness
    - uniqueness

# 过滤规则
filters:
  remove_english: true
  require_chinese_chars: true
  min_content_length: 100
  blocked_keywords:
    - "广告"
    - "推广"
    - "招聘"
    - "免责声明"
