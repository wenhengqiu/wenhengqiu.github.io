# ========== 备注说明 ==========
# 
# 优先级说明:
# - p0: 官方博客/核心媒体，必须采集
# - p1: 优质媒体，推荐采集
# - p2: 补充来源，可选采集
#
# 类型说明:
# - rss: RSS订阅源，直接解析
# - web: 网页，需要爬虫抓取
# - api: API接口，需要认证
#
# 更新频率建议:
# - p0源: 每小时检查
# - p1源: 每2小时检查
# - p2源: 每4小时检查
#
# 待添加源（需确认RSS/API）:
# - 知乎: 需要API或爬虫
# - Google Alerts: 需要邮件解析
# - 微信公众号: 需要第三方服务
# - Newsletter: 需要邮件解析
