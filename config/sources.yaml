# Info-Getter 信息源配置 v3.0
# 基于用户提供的完整清单整理
# 总计: 80+ 个高质量信息源
# 最后更新: 2026-03-15

version: "3.0"
description: "全球行业动态信息源完整版"

total_sources: 80

# 分批配置
fetch_settings:
  mode: "batch_parallel"
  batch_size: 10
  batch_delay: 3
  timeout: 30
  retry_times: 3

# 分类配置
categories:
  ai:
    name: "人工智能"
    keywords: ["GPT", "LLM", "大模型", "Claude", "Gemini", "Transformer", "OpenAI", "DeepMind", "Anthropic", "AI", "AGI"]
  
  robotics:
    name: "具身智能"
    keywords: ["人形机器人", "具身智能", "Embodied AI", "Figure AI", "Optimus", "宇树", "智元", "波士顿动力", "robotics"]
  
  autonomous:
    name: "自动驾驶"
    keywords: ["FSD", "自动驾驶", "ADAS", "NOA", "智驾", "特斯拉", "Tesla", "Waymo", "小鹏", "华为 ADS", "百度 Apollo", "self-driving"]
  
  zhuoyu:
    name: "卓驭科技"
    keywords: ["卓驭", "成行平台", "大疆车载", "双目视觉", "沈劭劼", "ZhuoYu", "DJI Automotive"]

