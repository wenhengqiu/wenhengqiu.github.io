<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业研究 | 数据闭环文章中心</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .category-card {
            background: var(--lighter);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow);
            transition: var(--transition);
            text-decoration: none;
            color: var(--text);
        }
        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px var(--shadow-lg);
        }
        .category-card.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        .category-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .category-card h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .category-card p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 12px;
        }
        .category-count {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .section {
            background: var(--lighter);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px var(--shadow);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h2 {
            font-size: 1.2rem;
        }
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .article-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            background: var(--light);
            border-radius: var(--radius);
            transition: var(--transition);
            cursor: pointer;
        }
        .article-item:hover {
            background: var(--border-light);
        }
        .article-item-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .article-item-content {
            flex: 1;
        }
        .article-item-content h4 {
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .article-item-content p {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .article-item-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .topic-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .topic-card {
            background: var(--light);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }
        .topic-card:hover {
            background: var(--border-light);
        }
        .topic-image {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        .topic-card h4 {
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        .topic-card p {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .topic-count {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
        }
        @media (max-width: 1024px) {
            .category-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .topic-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .category-grid {
                grid-template-columns: 1fr;
            }
            .topic-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🔄</span>
                    <span class="logo-text">数据闭环<br><small>文章中心</small></span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle">✕</button>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-title">每日更新</div>
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon">📰</span>
                        <span class="nav-text">每日必读</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-title">行业研究</div>
                    <a href="research.html?cat=autonomous" class="nav-item" id="nav-autonomous">
                        <span class="nav-icon">🚗</span>
                        <span class="nav-text">自动驾驶</span>
                    </a>
                    <a href="research.html?cat=robotics" class="nav-item" id="nav-robotics">
                        <span class="nav-icon">🤖</span>
                        <span class="nav-text">具身智能</span>
                    </a>
                    <a href="research.html?cat=llm" class="nav-item" id="nav-llm">
                        <span class="nav-icon">🧠</span>
                        <span class="nav-text">大模型</span>
                    </a>
                    <a href="research.html" class="nav-item active" id="nav-all">
                        <span class="nav-icon">📚</span>
                        <span class="nav-text">全部研究</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-title">工具</div>
                    <a href="timeline.html" class="nav-item">
                        <span class="nav-icon">📅</span>
                        <span class="nav-text">时间轴</span>
                    </a>
                    <a href="bookmarks.html" class="nav-item">
                        <span class="nav-icon">🔖</span>
                        <span class="nav-text">收藏夹</span>
                        <span class="nav-badge" id="bookmark-count">0</span>
                    </a>
                    <a href="dashboard.html" class="nav-item">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">数据看板</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <p>最后更新: <span id="last-update">--</span></p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <button class="menu-toggle" id="menu-toggle">☰</button>
                <div class="header-title">
                    <h1 id="page-title">行业研究</h1>
                    <p class="header-subtitle" id="page-subtitle">深度分析与技术解读</p>
                </div>
            </header>

            <!-- Content -->
            <div class="content">
                <!-- Category Cards -->
                <section class="category-grid" id="category-section">
                    <a href="research.html?cat=autonomous" class="category-card" data-cat="autonomous">
                        <div class="category-icon">🚗</div>
                        <h3>自动驾驶</h3>
                        <p>特斯拉、Waymo、小鹏、华为、百度、蔚来等公司的技术路线与商业模式分析</p>
                        <span class="category-count">10+ 篇文章</span>
                    </a>
                    <a href="research.html?cat=robotics" class="category-card" data-cat="robotics">
                        <div class="category-icon">🤖</div>
                        <h3>具身智能</h3>
                        <p>Figure AI、Optimus、智元、宇树等人形机器人研究</p>
                        <span class="category-count">8 篇文章</span>
                    </a>
                    <a href="research.html?cat=llm" class="category-card" data-cat="llm">
                        <div class="category-icon">🧠</div>
                        <h3>大模型</h3>
                        <p>OpenAI、Google、智谱、月之暗面等大模型技术解析</p>
                        <span class="category-count">15 篇文章</span>
                    </a>
                </section>

                <!-- Articles Section -->
                <section class="section" id="articles-section">
                    <div class="section-header">
                        <h2 id="articles-title">精选研究</h2>
                    </div>
                    <div class="article-list" id="research-list">
                        <!-- Dynamic content -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Load research articles
        async function loadResearch(category = null) {
            try {
                let articles = [];
                
                if (category === 'autonomous' || !category) {
                    const response = await fetch('data/articles/research/autonomous.json');
                    if (response.ok) {
                        const data = await response.json();
                        articles = [...articles, ...data];
                    }
                }
                
                // TODO: Load robotics and llm data
                
                renderArticles(articles, category);
            } catch (error) {
                console.error('Error loading research:', error);
                document.getElementById('research-list').innerHTML = '<p>加载失败，请稍后重试</p>';
            }
        }
        
        // Render articles
        function renderArticles(articles, category) {
            const list = document.getElementById('research-list');
            
            if (articles.length === 0) {
                list.innerHTML = '<p>暂无相关研究文章</p>';
                return;
            }
            
            // Filter by category if specified
            if (category) {
                articles = articles.filter(a => a.category === category);
            }
            
            // Sort by importance and date
            articles.sort((a, b) => {
                if (a.importance === 'high' && b.importance !== 'high') return -1;
                if (b.importance === 'high' && a.importance !== 'high') return 1;
                return new Date(b.publish_date) - new Date(a.publish_date);
            });
            
            list.innerHTML = articles.slice(0, 10).map(article => `
                <div class="article-item" onclick="openArticle('${article.id}')">
                    <div class="article-item-icon">${getCategoryIcon(article.category)}</div>
                    <div class="article-item-content">
                        <h4>${article.title}</h4>
                        <p>${article.summary}</p>
                        <div class="article-item-meta">
                            <span>🏢 ${article.companies?.join(', ') || article.source?.name}</span>
                            <span>📅 ${article.display_date}</span>
                            ${article.importance === 'high' ? '<span style="color:#ff6b6b">🔥 重要</span>' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Get category icon
        function getCategoryIcon(category) {
            const icons = {
                'autonomous': '🚗',
                'robotics': '🤖',
                'llm': '🧠',
                'company': '🏢',
                'product': '📱',
                'research': '🔬'
            };
            return icons[category] || '📄';
        }
        
        // Open article detail
        function openArticle(id) {
            showToast('文章详情功能开发中...');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initSidebar();
            updateBookmarkCount();
            
            // Get category from URL
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('cat');
            
            // Update UI based on category
            if (category) {
                document.querySelectorAll('.category-card').forEach(card => {
                    if (card.dataset.cat === category) {
                        card.classList.add('active');
                    }
                });
                
                document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
                    item.classList.remove('active');
                });
                
                const navItem = document.getElementById(`nav-${category}`);
                if (navItem) navItem.classList.add('active');
                
                // Update title
                const titles = {
                    'autonomous': '自动驾驶研究',
                    'robotics': '具身智能研究',
                    'llm': '大模型研究'
                };
                document.getElementById('page-title').textContent = titles[category] || '行业研究';
                document.getElementById('page-subtitle').textContent = '深度技术分析与行业洞察';
                document.getElementById('articles-title').textContent = '最新研究';
                
                // Hide category grid for specific category
                document.getElementById('category-section').style.display = 'none';
            }
            
            // Load articles
            loadResearch(category);
        });
    </script>
</body>
</html>
